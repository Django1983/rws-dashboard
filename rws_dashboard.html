<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RWS Optimum</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1923;color:#e0e6ed;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:#121e2b;border-bottom:1px solid #1e3048;position:sticky;top:0;z-index:100}
.logo-text{font-size:15px;font-weight:700;color:#fff;letter-spacing:.08em}
.logo-sub{font-size:11px;color:#4a7fa5;letter-spacing:.1em;text-transform:uppercase}
.header-time{font-size:20px;font-weight:300;color:#7aacc8}
.header-controls{display:flex;gap:8px}
.btn{padding:6px 14px;font-size:12px;border-radius:6px;cursor:pointer;border:1px solid #2a4a66;background:#1a2f42;color:#8bb8d4;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
.btn:hover{background:#1e3a52;color:#c0d8eb}
.btn-primary{background:#1a5c8a;border-color:#2277aa;color:#fff}
.status-bar{display:flex;align-items:center;gap:10px;padding:5px 24px;background:#0d1820;border-bottom:1px solid #1a2e40;font-size:11px;color:#4a7fa5}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.dot.loading{background:#f59e0b;animation:pulse 1.2s infinite}
.dot.error{background:#ef4444}
.dot.ok{background:#22c55e}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.section{background:#121e2b;border:1px solid #1e3048;border-radius:10px;overflow:hidden}
.section-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#0f1923;border-bottom:1px solid #1a2e40;font-size:13px;font-weight:500;color:#8bb8d4}
.section-badge{margin-left:auto;font-size:10px;padding:2px 10px;border-radius:20px;background:#0d2a40;color:#4a9acc;border:1px solid #1a4060;white-space:nowrap}
.auto-badge{font-size:10px;padding:2px 8px;border-radius:20px;background:#0d3020;color:#22c55e;border:1px solid #1a5030;margin-left:8px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:14px;border-bottom:1px solid #1a2e40}
.card{background:#0d1820;border:1px solid #1a3050;border-radius:8px;padding:10px 14px}
